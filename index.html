<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Delivery QR Scanner</title>
  <meta name="theme-color" content="#00377b">
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f4f7fb; }
    header { background:#00377b; color:#fff; padding:12px; }
    .wrap { max-width:1000px; margin:20px auto; padding:12px; }
    .card { background:#fff; padding:12px; border-radius:8px; margin-bottom:16px; }
    button { margin:4px; padding:8px 12px; border-radius:6px; border:none; cursor:pointer; }
    .danger { background:#dc2626; color:#fff; }
    .ghost { background:#eee; }
    .hidden { display:none; }
    table { width:100%; border-collapse:collapse; margin-top:10px; }
    th,td { border-bottom:1px solid #ddd; padding:6px; text-align:left; }
  </style>
</head>
<body>
  <header>
    <h1>Delivery QR Scanner</h1>
  </header>

  <div class="wrap">
    <!-- Scanner -->
    <section class="card">
      <h2>Scan QR</h2>
      <video id="video" playsinline autoplay muted class="hidden"></video>
      <canvas id="preview" class="hidden"></canvas>
      <div>
        <button id="openNative" class="ghost">Open Native Camera</button>
        <button id="openInApp">Open In-App Camera</button>
        <button id="closeInApp" class="ghost hidden">Close Camera</button>
        <button id="capture">Capture</button>
        <button id="upload" class="ghost">Upload Photo</button>
        <input id="file" type="file" accept="image/*" class="hidden">
      </div>
      <div id="status">Ready — align QR inside the guide.</div>
    </section>

    <!-- Logs -->
    <section class="card">
      <h2>Stored Logs <span id="count">0</span></h2>
      <table id="logTable">
        <thead><tr><th>Time</th><th>Material</th><th>Truck</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
      <div>
        <input id="exportDate" type="date">
        <button id="downloadDate" class="ghost">Download Date</button>
      </div>
      <div>
        <input id="exportFrom" type="date">
        <input id="exportTo" type="date">
        <button id="downloadRange" class="ghost">Download Range</button>
      </div>
      <div>
        <button id="clearAll" class="danger">Clear All Logs</button>
        <button id="chooseFolder" class="ghost">Choose Save Folder</button>
        <button id="saveAll" class="ghost">Save All</button>
      </div>
    </section>
  </div>

  <!-- Hidden inputs for native camera and upload -->
  <input id="cameraInput" type="file" accept="image/*" capture="environment" class="hidden">

  <!-- Decoder libraries -->
  <script src="libs/jsqr.min.js"></script>
  <script src="libs/zxing.min.js"></script>

  <script>
  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(r=>{
      console.log('SW registered', r.scope);
    }).catch(err=>{
      console.warn('SW registration failed', err);
    });
  }

  const video = document.getElementById('video');
  const preview = document.getElementById('preview');
  const status = document.getElementById('status');
  const openInApp = document.getElementById('openInApp');
  const closeInApp = document.getElementById('closeInApp');
  const captureBtn = document.getElementById('capture');
  const openNative = document.getElementById('openNative');
  const cameraInput = document.getElementById('cameraInput');
  const uploadBtn = document.getElementById('upload');
  const fileInput = document.getElementById('file');
  let stream = null;

  // Robust decode function
  async function decodeFileRobust(fileOrBlob){
    const img = await new Promise((res, rej)=>{
      const i=new Image();
      i.onload=()=>res(i);
      i.onerror=()=>rej(new Error('image load'));
      i.src = URL.createObjectURL(fileOrBlob);
    });
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    canvas.getContext('2d').drawImage(img,0,0);
    URL.revokeObjectURL(img.src);

    const ctx = canvas.getContext('2d');
    const data = ctx.getImageData(0,0,canvas.width,canvas.height);
    const code = window.jsQR ? jsQR(data.data, data.width, data.height) : null;
    if(code) return code.data;

    if(window.ZXing && window.ZXing.BrowserQRCodeReader){
      const reader = new window.ZXing.BrowserQRCodeReader();
      const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
      const url = URL.createObjectURL(blob);
      try {
        const result = await reader.decodeFromImageUrl(url);
        URL.revokeObjectURL(url);
        if(result && result.text) return result.text;
      } catch(e) {
        URL.revokeObjectURL(url);
      }
    }
    throw new Error('No QR found');
  }

  function handleDecoded(text){
    if(text){
      status.textContent = 'Decoded: ' + text;
      console.log('Decoded QR:', text);
      // TODO: add to logs table
    }
  }

  // In-app camera
  openInApp.addEventListener('click', async ()=>{
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' } });
      video.srcObject = stream;
      video.classList.remove('hidden');
      closeInApp.classList.remove('hidden');
      openInApp.classList.add('hidden');
      status.textContent = 'Camera open — tap Capture';
    } catch(e) {
      status.textContent = 'Camera unavailable';
    }
  });

  closeInApp.addEventListener('click', ()=>{
    if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
    video.srcObject=null;
    video.classList.add('hidden');
    closeInApp.classList.add('hidden');
    openInApp.classList.remove('hidden');
    status.textContent = 'Camera closed';
    const ctx = preview.getContext('2d');
    ctx && ctx.clearRect(0,0,preview.width,preview.height);
    preview.classList.add('hidden');
  });

  captureBtn.addEventListener('click', async ()=>{
    if(stream && video.videoWidth){
      preview.width = video.videoWidth;
      preview.height = video.videoHeight;
      const ctx = preview.getContext('2d');
      ctx.drawImage(video,0,0,preview.width,preview.height);
      preview.classList.remove('hidden');
      status.textContent = 'Captured frame — decoding...';
      try {
        const blob = await new Promise(res => preview.toBlob(res, 'image/jpeg', 0.95));
        const decoded = await decodeFileRobust(blob);
        handleDecoded(decoded);
      } catch(e) {
        status.textContent = 'No QR found';
      }
    }
  });

  // Native camera (mobile)
  openNative.addEventListener('click', ()=> cameraInput.click());
  cameraInput.addEventListener('change', async ev=>{
    const f = ev.target.files[0];
    if(!f) return;
    status.textContent = 'Decoding native photo...';
    try {
      const decoded = await decodeFileRobust(f);
      handleDecoded(decoded);
    } catch(e) {
      status.textContent = 'No QR found';
    }
  });

  // Upload photo (desktop)
  uploadBtn.addEventListener('click', ()=> fileInput.click());
  fileInput.addEventListener('change', async ev=>{
    const f = ev.target.files[0];
    if(!f) return;
    status.textContent = 'Decoding uploaded photo...';
    try {
      const decoded = await decodeFileRobust(f);
      handleDecoded(decoded);
    } catch(e) {
      status.textContent = 'No QR found';
    }
  });
  </script>
</body>
</html>
